name: 🎮 Build GameOptimizer AI

on:
  push:
    tags:
      - 'v*'          # Запускается при тегах v1.0, v1.1 и т.д.
  workflow_dispatch:  # Кнопка ручного запуска в GitHub

jobs:
  build-windows:
    name: 🪟 Windows EXE
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 🔨 Build EXE with PyInstaller
        run: |
          pyinstaller GameOptimizerAI.spec --clean --noconfirm

      - name: ✅ Test EXE exists
        run: |
          if (Test-Path "dist/GameOptimizerAI.exe") {
            Write-Host "✅ EXE built successfully!"
            $size = (Get-Item "dist/GameOptimizerAI.exe").Length / 1MB
            Write-Host "Size: $([math]::Round($size, 1)) MB"
          } else {
            Write-Host "❌ EXE not found!"
            exit 1
          }

      - name: 📦 Create release archive
        run: |
          Compress-Archive -Path dist/GameOptimizerAI.exe -DestinationPath GameOptimizerAI-Windows.zip

      - name: 🚀 Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: GameOptimizerAI-Windows.zip
          body: |
            ## 🎮 GameOptimizer AI ${{ github.ref_name }}

            ### 🪟 Установка (Windows)
            1. Скачай `GameOptimizerAI-Windows.zip`
            2. Распакуй архив
            3. Запусти `GameOptimizerAI.exe`
            4. Никаких дополнительных установок не нужно! ✨

            ### ✨ Что нового
            - Pixar 2026 дизайн
            - 11 игр, 88 оптимизаций
            - AI-друг Лuma
            - Безопасная очистка (защита античита)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Upload artifact (для обычных push)
        uses: actions/upload-artifact@v4
        with:
          name: GameOptimizerAI-Windows
          path: dist/GameOptimizerAI.exe
          retention-days: 7
